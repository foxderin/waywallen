# waywallen-mpv — libmpv-backed video renderer for waywallen.
#
# Installed to <prefix>/share/waywallen/renderers/waywallen-mpv.toml.
# The daemon spawns `waywallen-mpv-renderer` for any wallpaper with
# wp_type = "video". The `[renderer.settings]` table below is the
# typed schema the daemon validates source-plugin metadata against
# before forking the child; the canonical resource path travels in
# `metadata["path"]` (no per-renderer primary key any more).

[renderer]
name = "waywallen-mpv"
bin = "../../../bin/waywallen-mpv-renderer"
types = ["video"]
priority = 100
spawn_version = 3

[renderer.settings]
loop_file   = { type = "string", default = "inf",  identity = false }
hwdec       = { type = "string", default = "auto", identity = false }
# `render_node` selects the GPU before EGL init, so a change forces
# a respawn — `identity = true`. Empty string (the default) means
# "auto-enumerate"; the CLI flag `--render-node` overrides this for
# standalone-debug runs.
render_node = { type = "string", default = "",     identity = true  }
