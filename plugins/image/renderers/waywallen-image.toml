[renderer]
name = "waywallen-image"
bin = "../../../bin/waywallen-image-renderer"
types = ["image"]
priority = 100
spawn_version = 3

[renderer.settings]
# Frame rate the image renderer drives bridge presents at. Image
# wallpapers are static so this only governs the redraw heartbeat
# (cursor input, idle composition); 30 is plenty.
fps = { type = "u32", default = 30, min = 1, max = 240, step = 1, identity = true, label_key = "settings.image.fps", group = "render", order = 10 }
